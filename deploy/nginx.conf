# ─────────────────────────────────────────────────────────────────────────────
# GPS Fleet Tracker — Nginx Reverse Proxy Config
#
# This proxies HTTP traffic from port 80 to the Express app on port __APP_PORT__.
# Port 5023 (GT06N TCP) is NOT handled by nginx — it goes directly to Node.js.
#
# Installation:
#   sudo bash /opt/gps-tracker/deploy/nginx-install.sh
#
# To add HTTPS later:
#   sudo certbot --nginx -d yourdomain.com
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;

    # Replace with your domain or VPS IP address.
    # For IP-only access, you can use _ (catch-all).
    server_name _;

    # Increase buffer sizes for WebSocket support
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # ── HTTP API and static frontend ───────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:__APP_PORT__;
        proxy_http_version 1.1;

        # WebSocket upgrade support (required for live tracking)
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts (long for WebSocket connections)
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 60s;
    }

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/gps-tracker-access.log;
    error_log  /var/log/nginx/gps-tracker-error.log;
}

# NOTE: Port 5023 (GT06N binary TCP) is handled directly by Node.js.
# No nginx configuration is needed for it — just ensure your VPS firewall
# (UFW / Oracle Security List) has port 5023 open for TCP.
